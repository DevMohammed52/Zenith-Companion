name: Update Market & Boss Data

on:
  schedule:
    - cron: '0 0,12 * * *' # Full update twice a day
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: market-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Market & Boss Scraper
        env:
          IDLEMMO_API_KEY: ${{ secrets.IDLEMMO_API_KEY }}
          SCRAPE_ONCE: "true"
        run: node scraper.mjs

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/*.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash push -m "generated market data" -- public/*.json
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git stash pop
          git add public/*.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: auto-update market data and boss schedules [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
