name: Update Market & Boss Data

on:
  schedule:
    - cron: '0 0,12 * * *' # Full update twice a day
    - cron: '0 6,18 * * *' # Priority update twice a day (Materials/Consumables)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Market & Boss Scraper
        env:
          IDLEMMO_API_KEY: ${{ secrets.IDLEMMO_API_KEY }}
          SCRAPE_ONCE: "true"
        run: |
          if [[ "${{ github.event.schedule }}" == "0 6,18 * * *" ]]; then
            echo "Running PRIORITY update..."
            node scraper.mjs --priority
          else
            echo "Running FULL update..."
            node scraper.mjs
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/*.json
          git commit -m "chore: auto-update market data and boss schedules [skip ci]" || echo "No changes to commit"
          git push
