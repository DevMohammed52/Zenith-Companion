name: Update Market & Boss Data

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch Gear Static Data (if missing)
        env:
          IDLEMMO_API_KEY: ${{ secrets.IDLEMMO_API_KEY }}
        run: |
          if [ ! -f public/gear-data.json ]; then
            echo "gear-data.json not found. Running full gear fetch..."
            node fetch-gear-data.mjs
          else
            echo "gear-data.json exists. Skipping gear fetch."
          fi

      - name: Run Market & Boss Scraper
        env:
          IDLEMMO_API_KEY: ${{ secrets.IDLEMMO_API_KEY }}
          SCRAPE_ONCE: "true"
        run: node scraper.mjs

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/market-data.json public/static-data.json public/scraper-status.json public/gear-data.json
          git commit -m "chore: auto-update market data and boss schedules [skip ci]" || echo "No changes to commit"
          git push
